# Cloudflare Tunnel configuration for LGL-Ingest
#
# Setup steps:
#   1. Install cloudflared: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/get-started/
#   2. Authenticate:        cloudflared tunnel login
#   3. Create the tunnel:   cloudflared tunnel create lgl-ingest
#   4. Copy credentials:    cp ~/.cloudflared/<tunnel-uuid>.json config/cloudflared/credentials.json
#   5. Set the tunnel ID below (shown after step 3, or: cloudflared tunnel list)
#   6. Add DNS routes:      cloudflared tunnel route dns lgl-ingest ingest.lgl-os.com
#
# The tunnel creates an outbound-only connection — no inbound ports needed.

tunnel: <YOUR_TUNNEL_UUID>
credentials-file: /etc/cloudflared/credentials.json

ingress:
  # WebSocket gateway — device connections
  # Cloudflare handles TLS; traffic arrives at Axum as plain WS
  - hostname: ingest.lgl-os.com
    path: /devices
    service: http://ingest:8080
    originRequest:
      # Keep WebSocket connections alive through Cloudflare's proxies.
      # The Axum server already pings every 30s, well within this window.
      connectTimeout: 10s
      noTLSVerify: false
      # Pass the real client IP so the rate limiter sees the device IP,
      # not Cloudflare's egress IP.
      # On the server side, read CF-Connecting-IP instead of peer addr.
      http2Origin: false   # WebSocket requires HTTP/1.1 upgrade

  # REST API — portal dashboard
  - hostname: ingest.lgl-os.com
    service: http://ingest:8080

  # Catch-all (required by cloudflared)
  - service: http_status:404
