# Cloudflare Tunnel configuration for LGL Uplink Portal
#
# Setup steps:
#   1. Install cloudflared: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/get-started/
#   2. Authenticate:        cloudflared tunnel login
#   3. Create the tunnel:   cloudflared tunnel create lgl-uplink-portal
#   4. Copy credentials:    cp ~/.cloudflared/<tunnel-uuid>.json config/cloudflared/credentials.json
#   5. Set the tunnel ID below (shown after step 3, or: cloudflared tunnel list)
#   6. Add DNS routes:      cloudflared tunnel route dns lgl-uplink-portal uplink-portal.lgl-os.com
#
# The tunnel creates an outbound-only connection — no inbound ports needed.

tunnel: bc61dd0c-8963-444b-8b71-41977968602b
credentials-file: /etc/cloudflared/credentials.json

ingress:
  # WebSocket gateway — device connections (uplink hardware → portal)
  # http2Origin: false is required — WebSocket upgrade needs HTTP/1.1
  - hostname: uplink-portal.lgl-os.com
    path: /devices
    service: http://uplink-portal:8090
    originRequest:
      connectTimeout: 10s
      noTLSVerify: false
      http2Origin: false
      tcpKeepAlive: 25s      # keep-alive below the server's 30s ping interval

  # WebSocket telemetry stream — browser dashboard → portal
  # Must also use HTTP/1.1 for WebSocket upgrade; same keep-alive settings.
  - hostname: uplink-portal.lgl-os.com
    path: /api/v1/devices/.*/telemetry/stream
    service: http://uplink-portal:8090
    originRequest:
      connectTimeout: 10s
      noTLSVerify: false
      http2Origin: false
      tcpKeepAlive: 25s

  # REST API + all other portal routes
  - hostname: uplink-portal.lgl-os.com
    service: http://uplink-portal:8090

  # Catch-all (required by cloudflared)
  - service: http_status:404
