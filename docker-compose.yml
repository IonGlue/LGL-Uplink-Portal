services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: lgl_ingest
      POSTGRES_USER: ingest
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ingest -d lgl_ingest"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ingest:
    build: .
    # No public port exposure — access is only via the cloudflare tunnel.
    # Expose 8080 locally only during development (remove in production).
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DATABASE_URL: postgres://ingest:password@postgres:5432/lgl_ingest
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Portal frontend (dev mode with HMR — for production, build and serve statically)
  portal:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      # Vite proxies /api/* to this address
      VITE_API_BASE: http://ingest:8080
    depends_on:
      - ingest

  # Cloudflare Tunnel — exposes the ingest service through Cloudflare's edge
  # without opening any public inbound ports on this host.
  #
  # Usage:
  #   1. Create a tunnel: cloudflared tunnel create lgl-ingest
  #   2. Copy the credentials JSON to config/cloudflare-tunnel-credentials.json
  #   3. Set CLOUDFLARE_TUNNEL_TOKEN (or use credentials file below)
  #
  # Comment this service out for local-only development.
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./config/cloudflared:/etc/cloudflared:ro
    depends_on:
      - ingest
    environment:
      # Alternative to the config file: set the tunnel token directly.
      # Get it from: Cloudflare Zero Trust → Access → Tunnels → your tunnel → Token
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}

volumes:
  pgdata:
