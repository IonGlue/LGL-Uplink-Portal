version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lgl_ingest
      POSTGRES_USER: lgl
      POSTGRES_PASSWORD: lgl
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  # The supervisor uses host networking so it can freely bind to SRT ports
  # (port 9000 REST API, port 5001 default SRT input, ports 10000-11000 internal routing,
  #  plus any custom SRT listen ports configured per-source)
  supervisor:
    build:
      context: .
      dockerfile: Dockerfile.supervisor
    restart: unless-stopped
    network_mode: host
    volumes:
      - /tmp:/tmp                              # temp config files for worker processes
      - recordings:/recordings
      - hls:/var/hls
      - ./ingest-supervisor/config.toml:/etc/ingest-supervisor/config.toml:ro
    environment:
      RUST_LOG: info

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://lgl:lgl@postgres:5432/lgl_ingest
      REDIS_URL: redis://redis:6379
      JWT_SECRET: changeme-in-production
      # supervisor uses network_mode: host — reach it via host gateway
      SUPERVISOR_API_URL: http://host.docker.internal:9000
      CONFIG_PATH: /app/config/ingest.toml
    extra_hosts:
      # Allows server container to reach host-networked supervisor on Linux
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/app/config:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:8080"
    # No env vars needed — nginx proxies /api and /ws to the server container

volumes:
  postgres_data:
  recordings:
  hls:
